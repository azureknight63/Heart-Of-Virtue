# =============================================================================
# Heart of Virtue — Combat Testing Configuration (Beta 2 King Slime)
# =============================================================================
# This file is the single control surface for agent-driven combat testing.
# Edit this file then restart (or re-run /combat-test) to apply changes.
# The skill /combat-test reads this file, applies overrides, and invokes /qa.
#
# CURRENT TARGET: King Slime — GrondelithArena (tile 2, 6)
#   startmap      = grondelith-mineral-pools
#   startposition = 2, 5  (GrondelithApproach — one tile north of the arena)
#
# No quest flags required. King Slime is spawned by NPCSpawnerEvent on the
# arena tile and is always present on a fresh load.
#
# NOTE: active_scenario in [scenario] below is only used by the /combat-test
# skill when navigating within the combat-testing-arena sandbox. It has no
# effect when startmap is set to a world map.
# =============================================================================

[game]
testmode            = True
skipdialog          = True
skipintro           = True
startmap            = grondelith-mineral-pools
startposition       = 2, 5
use_colour          = True
enable_animations   = True

# Set to True to grant all skills immediately on spawn.
# Useful for testing high-tier moves without grinding.
learn_all_skills    = True


# =============================================================================
# [player]  — Jean's starting state when the map loads
# =============================================================================
# Tuned for fast King Slime testing:
#   - HP 350: survives several King Slime hits (50 dmg base) comfortably.
#   - Strength/Finesse 35: kills the 400-HP King Slime in a handful of turns.
#   - King Slime resistances: slashing 0.65, piercing 0.65, crushing 1.2,
#     fire 1.5, earth 0.9. Immune to poison and slimed.
#   - Shortsword (Sword subtype = slashing) exploits the 0.65 resistance.
#   - Restoratives for survivability during the fight.
#   The Adjutant NPC in the Proving Grounds can adjust stats at runtime if
#   using the combat-testing-arena instead.
# =============================================================================
[player]

hp              = 350
maxhp           = 350

# Core attributes (1–100 recommended; affects move speed, damage, fatigue costs)
strength        = 35
finesse         = 35
speed           = 15
endurance       = 10
charisma        = 10
intelligence    = 10
faith           = 10

# Level and experience
level           = 5
exp             = 0

# Heat (damage multiplier; 0.5–10.0)
heat            = 1.0

# Shortsword deals slashing damage (0.65x on King Slime — optimal).
# IronCuirass for physical mitigation. Restoratives for healing mid-fight.
starting_items  = Shortsword, IronCuirass, Restorative, Restorative, Restorative


# =============================================================================
# [scenario]  — Which combat scenario to run when /combat-test is invoked
# =============================================================================
# active_scenario controls which arena tile the skill navigates to (only
# applies when startmap = combat-testing-arena):
#   fodder        → Fodder Pit       (1, 0) — Slime + CaveBat
#   boss          → The Crucible     (2, 0) — KingSlime + Lurker
#   ally          → Ally Courtyard   (0, 1) — Gorran (ally) + Slime (enemy)
#   status_dummy  → Status Chamber   (1, 1) — Pell, all resistances stripped
# =============================================================================
[scenario]

active_scenario = boss

# Maximum combat rounds before the skill declares a test timeout.
# Set low for quick smoke-tests; set high for survivability/endurance tests.
max_rounds      = 50

# Whether to inject Gorran into the ally arena even when active_scenario != ally.
# Only applies if active_scenario = ally.
spawn_ally      = False

# Custom enemy class name overrides (comma-separated, must exist in npc.py).
# Only used when active_scenario = custom.
custom_enemies  = Slime, CaveBat


# =============================================================================
# [combat_events]  — Events to inject into the combat encounter
# =============================================================================
# Comma-separated event class names from story/effects.py (or submodules).
# Leave active_events blank for a clean combat with no event triggers.
# Example: active_events = Ch01ChestRumblerBattle, SomeFutureEvent
# =============================================================================
[combat_events]

active_events   =
events_repeat   = False


# =============================================================================
# [post_battle_qa]  — What to watch for after King Slime dies
# =============================================================================
# This is a documentation section (no keys are read by the engine).
#
# Three story events are attached to the GrondelithArena tile (2, 6):
#
#   Ch02ArenaEntrance (pre-combat):
#     Fires once when Jean first steps into tile (2, 6) with King Slime
#     present. Delivers the isolation/atmosphere narrative and sets
#     story["arena_entered"] = "1". Expected: narrative text plays, flag set.
#
#   AfterDefeatingKingSlime (post-combat):
#     Fires once King Slime is absent from the tile (dead). Sequence:
#       1. Narrative text: pool cleanses, blue water returns.
#       2. Tile description updated via spawn_object("TileDescription"):
#            "The circular cavern is still. The pool that filled it — wall to
#            wall with pulsating corruption — is gone. Clean, luminescent blue
#            water rests in its place..."
#       3. MineralFragment spawned on the tile.
#       4. Ch02KingSlimeMemoryFlash queued (fires on MineralFragment pickup).
#       5. story["king_slime_defeated"] = "1" set.
#       6. Gorran teleports to the arena.
#     Expected: all six steps fire in order; tile description visibly changes.
#
#   Ch02GorranReminder (post-combat, repeating reminder):
#     Active after king_slime_defeated = "1" while Jean has not yet picked up
#     the MineralFragment and Votha Krr has not yet responded. Gorran nudges
#     Jean toward the fragment. Clears itself once votha_krr_response_given
#     is set.
#     Expected: reminder fires on tile re-entry; stops once fragment collected.
#
#   Ch02KingSlimeMemoryFlash (dynamically queued):
#     Added to tile events by AfterDefeatingKingSlime.process(). Fires when
#     Jean picks up the MineralFragment. Memory flash sequence; sets
#     story["king_slime_flash_fired"] = "1".
#     Expected: flash plays on pickup; does not replay on second pickup.
#
# DOWNSTREAM (not on this tile — out of scope for this config):
#   AfterKingSlimeReturn fires on re-entry to any Grondia tile after defeat.
#   Votha Krr scene plays; sets story["votha_krr_response_given"].
# =============================================================================


# =============================================================================
# [debug]  — Logging and diagnostic flags
# =============================================================================
[debug]

debug_mode              = True
debug_positions         = True
debug_damage_calc       = True
debug_accuracy          = True
debug_ai_decisions      = True
debug_npc_positions     = True

log_combat_moves        = True
log_distance_calculations = True
log_npc_decisions       = True
log_file                = combat_test.log

# Tracks beats-per-second during non-player turns.
monitor_bps             = True

# Log performance timings.
log_performance         = True


# =============================================================================
# [arena]  — Grid and positioning settings for the combat coordinate system
# =============================================================================
[arena]

# Size of the combat grid (x, y). Default 50×50.
coordinate_grid_size        = 50, 50

# Validate coordinate system at combat start.
validate_grid_bounds        = True
validate_distance_calc      = True
validate_angle_calc         = True
validate_modifier_calc      = True

# Display settings (terminal mode)
show_combat_distance        = True
show_unit_positions         = True
show_facing_directions      = True
show_damage_modifiers       = True
show_accuracy_modifiers     = True
show_coordinate_display     = True

# Starting positions for each scenario type.
# These are the combat-grid coordinates, not map tile coordinates.
standard_player_x           = 25
standard_player_y           = 10
standard_enemy_x            = 25
standard_enemy_y            = 40


# =============================================================================
# [npc_ai]  — NPC AI tuning parameters
# =============================================================================
[npc_ai]

ai_difficulty               = 3
npc_decision_delay          = 0.5
npc_flanking_enabled        = True
npc_flanking_threshold      = 45.0
npc_retreat_health_threshold = 0.3
npc_flanking_distance_range = 20.0 to 40.0
npc_tactical_retreat        = True


# =============================================================================
# [development]  — Flags that affect game-loop and system behaviour
# =============================================================================
[development]

# God mode: Jean cannot die. Useful for testing move/event logic in isolation.
god_mode        = False

# Skip all combat (auto-win). Use only to test post-combat reward paths.
skip_combat     = False

# Hot reload (placeholder — not yet implemented in game code).
enable_hot_reload = False
