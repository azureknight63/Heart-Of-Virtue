# =============================================================================
# Heart of Virtue — Combat Testing Configuration
# =============================================================================
# This file is the single control surface for agent-driven combat testing.
# Edit this file then restart (or re-run /combat-test) to apply changes.
# The skill /combat-test reads this file, applies overrides, and invokes /qa.
# =============================================================================

[game]
testmode            = True
skipdialog          = True
skipintro           = True
startmap            = combat-testing-arena
startposition       = 0, 0
use_colour          = True
enable_animations   = True

# Set to True to grant all skills immediately on spawn.
# Useful for testing high-tier moves without grinding.
learn_all_skills    = True


# =============================================================================
# [player]  — Jean's starting state when the arena loads
# =============================================================================
# These values override the Player defaults at game start.
# The Adjutant NPC in the Proving Grounds lets you change them at runtime.
# =============================================================================
[player]

hp              = 100
maxhp           = 100

# Core attributes (1–100 recommended; affects move speed, damage, fatigue costs)
strength        = 10
finesse         = 10
speed           = 10
endurance       = 10
charisma        = 10
intelligence    = 10
faith           = 10

# Level and experience
level           = 1
exp             = 0

# Heat (damage multiplier; 0.5–10.0)
heat            = 1.0

# Comma-separated item class names from items.py.
# The equipment rack in the Proving Grounds is always fully stocked regardless.
starting_items  = Shortsword, LeatherArmor, Restorative, Restorative, Antidote


# =============================================================================
# [scenario]  — Which combat scenario to run when /combat-test is invoked
# =============================================================================
# active_scenario controls which arena tile the skill navigates to:
#   fodder        → Fodder Pit       (1, 0) — Slime + CaveBat
#   boss          → The Crucible     (2, 0) — KingSlime + Lurker
#   ally          → Ally Courtyard   (0, 1) — Gorran (ally) + Slime (enemy)
#   status_dummy  → Status Chamber   (1, 1) — Pell, all resistances stripped
# =============================================================================
[scenario]

active_scenario = fodder

# Maximum combat rounds before the skill declares a test timeout.
# Set low for quick smoke-tests; set high for survivability/endurance tests.
max_rounds      = 50

# Whether to inject Gorran into the ally arena even when active_scenario != ally.
# Only applies if active_scenario = ally.
spawn_ally      = True

# Custom enemy class name overrides (comma-separated, must exist in npc.py).
# Only used when active_scenario = custom.
custom_enemies  = Slime, CaveBat


# =============================================================================
# [combat_events]  — Events to inject into the combat encounter
# =============================================================================
# Comma-separated event class names from story/effects.py (or submodules).
# Leave active_events blank for a clean combat with no event triggers.
# Example: active_events = Ch01ChestRumblerBattle, SomeFutureEvent
# =============================================================================
[combat_events]

active_events   =
events_repeat   = False


# =============================================================================
# [debug]  — Logging and diagnostic flags
# =============================================================================
[debug]

debug_mode              = True
debug_positions         = True
debug_damage_calc       = True
debug_accuracy          = True
debug_ai_decisions      = True
debug_npc_positions     = True

log_combat_moves        = True
log_distance_calculations = True
log_npc_decisions       = True
log_file                = combat_test.log

# Tracks beats-per-second during non-player turns.
monitor_bps             = True

# Log performance timings.
log_performance         = True


# =============================================================================
# [arena]  — Grid and positioning settings for the combat coordinate system
# =============================================================================
[arena]

# Size of the combat grid (x, y). Default 50×50.
coordinate_grid_size        = 50, 50

# Validate coordinate system at combat start.
validate_grid_bounds        = True
validate_distance_calc      = True
validate_angle_calc         = True
validate_modifier_calc      = True

# Display settings (terminal mode)
show_combat_distance        = True
show_unit_positions         = True
show_facing_directions      = True
show_damage_modifiers       = True
show_accuracy_modifiers     = True
show_coordinate_display     = True

# Starting positions for each scenario type.
# These are the combat-grid coordinates, not map tile coordinates.
standard_player_x           = 25
standard_player_y           = 10
standard_enemy_x            = 25
standard_enemy_y            = 40


# =============================================================================
# [npc_ai]  — NPC AI tuning parameters
# =============================================================================
[npc_ai]

ai_difficulty               = 3
npc_decision_delay          = 0.5
npc_flanking_enabled        = True
npc_flanking_threshold      = 45.0
npc_retreat_health_threshold = 0.3
npc_flanking_distance_range = 20.0 to 40.0
npc_tactical_retreat        = True


# =============================================================================
# [development]  — Flags that affect game-loop and system behaviour
# =============================================================================
[development]

# God mode: Jean cannot die. Useful for testing move/event logic in isolation.
god_mode        = False

# Skip all combat (auto-win). Use only to test post-combat reward paths.
skip_combat     = False

# Hot reload (placeholder — not yet implemented in game code).
enable_hot_reload = False
