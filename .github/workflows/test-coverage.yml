# Test Coverage Monitoring — runs on every PR and push
# Enforces coverage minimums and generates reports
# Fails if:
# - Backend coverage drops below 85%
# - Frontend coverage drops below 95%
# - Any tests fail

name: Test Coverage

on:
  push:
    branches: [master, web-api, develop, main]
  pull_request:
    branches: [master, web-api, develop, main]

jobs:
  # Backend and frontend coverage jobs run in parallel for faster feedback.
  # - backend-coverage: Validates all tests pass and enforces coverage minimums
  # - frontend-coverage: Independent frontend test job
  # Both must complete before coverage-report summarizes results

  backend-coverage:
    name: Backend Coverage (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    outputs:
      coverage: ${{ steps.backend_coverage.outputs.coverage }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt pytest-xdist

      - name: Run coverage tests
        run: |
          python -m pytest \
            --cov=src \
            --cov=ai \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -n auto -v
        env:
          MYNX_LLM_ENABLED: "0"
          MYNX_LLM_PROVIDER: "none"
        timeout-minutes: 12

      - name: Extract backend coverage percentage
        id: backend_coverage
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            PCT=$(python -c "import xml.etree.ElementTree as ET; print(round(float(ET.parse('coverage.xml').getroot().get('line-rate')) * 100, 1))")
          else
            PCT="N/A"
          fi
          echo "coverage=$PCT" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
        if: always()

  frontend-coverage:
    name: Frontend Coverage (vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    outputs:
      coverage: ${{ steps.frontend_coverage.outputs.coverage }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests with coverage
        run: |
          cd frontend && npm test -- --run --coverage
        id: vitest

      - name: Extract frontend coverage percentage
        id: frontend_coverage
        if: always()
        run: |
          if [ -f frontend/coverage/coverage-summary.json ]; then
            PCT=$(node -e "console.log(require('./frontend/coverage/coverage-summary.json').total.lines.pct)")
          else
            PCT="N/A"
          fi
          echo "coverage=$PCT" >> "$GITHUB_OUTPUT"

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v3
        with:
          directory: ./frontend/coverage
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
        if: always()

  coverage-report:
    name: Coverage Report Summary
    runs-on: ubuntu-latest
    needs: [backend-coverage, frontend-coverage]
    if: always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post coverage badge to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          BACKEND_COVERAGE: ${{ needs.backend-coverage.outputs.coverage }}
          FRONTEND_COVERAGE: ${{ needs.frontend-coverage.outputs.coverage }}
        with:
          script: |
            const backendMin = 85;
            const frontendMin = 95;

            function currentCell(value) {
              const pct = parseFloat(value);
              return Number.isNaN(pct) ? "N/A" : `${pct}%`;
            }

            function statusBadge(label, value, min) {
              const pct = parseFloat(value);
              if (Number.isNaN(pct)) {
                return `![${label}](https://img.shields.io/badge/${label}-unknown-lightgrey)`;
              }
              const color = pct >= min ? "green" : "red";
              return `![${label} Coverage](https://img.shields.io/badge/${label}-${pct}%25-${color})`;
            }

            const backendCov = process.env.BACKEND_COVERAGE;
            const frontendCov = process.env.FRONTEND_COVERAGE;

            const coverage_badge = "## Coverage Status\n\n" +
              "| Layer | Minimum | Current | Status |\n" +
              "|-------|---------|---------|--------|\n" +
              `| Backend | ${backendMin}% | ${currentCell(backendCov)} | ${statusBadge('backend', backendCov, backendMin)} |\n` +
              `| Frontend | ${frontendMin}% | ${currentCell(frontendCov)} | ${statusBadge('frontend', frontendCov, frontendMin)} |\n\n` +
              "See README.md for badge details.\n" +
              "View full reports: Backend htmlcov/index.html, Frontend frontend/coverage/index.html";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: coverage_badge
            });
        continue-on-error: true
