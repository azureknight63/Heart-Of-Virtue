# Continuous Integration — runs on every push and PR
# Ensures tests and linting pass before code lands on master.

name: CI

on:
  push:
    branches: [master, web-api]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q
        env:
          MYNX_LLM_ENABLED: "0"
          MYNX_LLM_PROVIDER: "none"

      - name: Check formatting (black)
        run: |
          VER=$(python -m black --version 2>&1 | head -1)
          echo "::warning::black version in CI: $VER"
          HAS_TOML=$(test -f pyproject.toml && echo "found" || echo "MISSING")
          echo "::warning::pyproject.toml: $HAS_TOML"
          CADIFF=$(python -m black --diff --no-cache src/api/combat_adapter.py 2>&1)
          if [ -n "$CADIFF" ]; then
            echo "::error file=src/api/combat_adapter.py::DIFF: $CADIFF"
          fi
          DIFF=$(python -m black --diff src/ 2>&1)
          if [ -n "$DIFF" ]; then
            echo "$DIFF" | grep '^--- ' | awk '{print $2}' | while read f; do
              echo "::error file=$f,title=black formatting required::run: python -m black $f"
            done
          fi
          python -m black --check src/

      - name: Lint (flake8)
        run: flake8 --extend-ignore=E501,E203 src/  # E203: Black formats slices with spaces (known Black/flake8 conflict)

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --run
