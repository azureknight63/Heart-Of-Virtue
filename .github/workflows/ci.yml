# Continuous Integration — runs on every push and PR
# Ensures tests and linting pass before code lands on master.

name: CI

on:
  push:
    branches: [master, web-api]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q
        env:
          MYNX_LLM_ENABLED: "0"
          MYNX_LLM_PROVIDER: "none"

      - name: Check formatting (black)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python -m black --diff --no-cache src/ > /tmp/bdiff.txt 2>&1 || true
          if grep -q '^@@' /tmp/bdiff.txt; then
            if [ -n "$PR_NUMBER" ]; then
              python3 - <<'PYEOF'
import os, json, urllib.request
with open('/tmp/bdiff.txt') as f:
    udiff = f.read()
body = f"**CI black diff** (run {os.environ['GITHUB_RUN_ID']})\n\n```diff\n{udiff}\n```"
data = json.dumps({'body': body}).encode()
req = urllib.request.Request(
    f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/issues/{os.environ['PR_NUMBER']}/comments",
    data=data,
    headers={'Authorization': f"token {os.environ['GH_TOKEN']}", 'Content-Type': 'application/json'},
)
urllib.request.urlopen(req)
print('Posted diff comment to PR')
PYEOF
            fi
          fi
          python -m black --check src/

      - name: Lint (flake8)
        run: flake8 --extend-ignore=E501,E203 src/  # E203: Black formats slices with spaces (known Black/flake8 conflict)

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --run
