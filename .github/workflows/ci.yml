# Continuous Integration — runs on every push and PR
# Ensures tests and linting pass before code lands on master.

name: CI

on:
  push:
    branches: [master, web-api]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q
        env:
          MYNX_LLM_ENABLED: "0"
          MYNX_LLM_PROVIDER: "none"

      - name: Check formatting (black)
        run: |
          cp src/api/combat_adapter.py /tmp/combat_adapter_ci.py
          python -m black --no-cache /tmp/combat_adapter_ci.py 2>/dev/null
          DIFF=$(diff src/api/combat_adapter.py /tmp/combat_adapter_ci.py || true)
          if [ -n "$DIFF" ]; then
            echo "::error file=src/api/combat_adapter.py,title=black diff::$DIFF"
          fi
          python -m black --check src/

      - name: Lint (flake8)
        run: flake8 --extend-ignore=E501,E203 src/  # E203: Black formats slices with spaces (known Black/flake8 conflict)

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --run
