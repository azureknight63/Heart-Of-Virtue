[game]
# ─────────────────────────────────────────────────────────
# Eastern Descent — Event Chain Test Configuration
# ─────────────────────────────────────────────────────────
# Arc scope: Eastern Descent map entry → Nomad Camp arrival
#   GorranGestureEvent (0,2)
#   EasternRoadTurnbackEvent (5,2) — repeating block
#   NomadCampSmellEvent → MaraFirstContactEvent → DevetIntroEvent
#   LissObservingEvent → MaraObservationEvent
#
# Usage (terminal):
#   CONFIG_FILE=config_eastern_descent_test.ini python src/game.py
#
# Usage (API / web):
#   Set CONFIG_FILE=config_eastern_descent_test.ini in .env, then restart.
#
# GorranGestureEvent NOTE: The event fires only when player.previous_tile
# carries a Grondia title. Starting directly on the map bypasses that guard.
# To exercise it naturally, start at grondia (15,5) with a Passageway east,
# or simply step west off (0,2) and back east during a session.
# ─────────────────────────────────────────────────────────

testmode = True
skipdialog = False
; Set skipdialog = True to rush through all print_slow / await_input calls
skipintro = True

; ── Starting position ──────────────────────────────────
; (0,2) = GrondiaEasternGate — map entry; GorranGestureEvent tile
startmap = eastern-descent
startposition = 0, 2

; ── Story flags pre-seeded ─────────────────────────────
; Reflects Jean's narrative state: King Slime is defeated, Votha has
; spoken, and Jean is stepping into Chapter 3. All Ch02 gates are set.
starting_story_flags = king_slime_defeated, votha_krr_response_given, lurker_defeated

; ── Starting loadout ───────────────────────────────────
; Equipment: Shortsword (lv3 enchant) + full leather set
starting_equipment = Shortsword:3, LeatherArmor:0, LeatherCap:0, LeatherGloves:0, LeatherBoots:0

; Starting inventory: consumables for the descent
starting_items = Restorative, Restorative, Restorative, Antidote, Antidote

; Starting gold: enough to pay Mara's river-crossing fee
starting_gold = 300

; Starting experience: level 8
; Formula: cumulative EXP = Σ(n × 155) for n=1..7 = 155+310+465+620+775+930+1085 = 4340
; (exp_to_level = level × (165 − intelligence=10) = level × 155)
starting_exp = 4340

; Starting party: Gorran joins Jean's party from the very start
starting_party_members = Gorran

; ── Misc ───────────────────────────────────────────────
use_colour = True
debug_mode = False
autosave_enabled = False
learn_all_skills = False
